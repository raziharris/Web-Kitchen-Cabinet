<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cabinet Booking Studio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="site-header main-header">
      <a class="studio-logo" href="/">
        <span class="logo-icon" aria-hidden="true"></span>
        <span>
          <strong>CABINET STUDIO</strong>
        </span>
      </a>
      <div class="product-actions">
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Switch to dark mode">Dark</button>
      </div>
    </header>

    <main class="page-shell">
      <section class="hero">
        <h1>Select a Product Series</h1>
        <p>Find the perfect cabinet solution for every space in your home.</p>
      </section>

      <section class="series-list" id="seriesList" aria-label="Product series"></section>

      <section class="home-benefits" aria-label="Service benefits">
        <div><span aria-hidden="true">⌁</span><strong>Free Site Measurement</strong><small>Professional & accurate</small></div>
        <div><span aria-hidden="true">◇</span><strong>Premium Materials</strong><small>Built to last</small></div>
        <div><span aria-hidden="true">⚙</span><strong>Expert Craftsmanship</strong><small>Quality you can trust</small></div>
        <div><span aria-hidden="true">☏</span><strong>Dedicated Support</strong><small>From start to finish</small></div>
      </section>
    </main>
  </body>
</html>
